<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Users</title>

<style>

/* ================= GLOBAL ================= */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: #f0f2f5;
}

/* ================= MAIN LAYOUT ================= */
.layout {
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.left {
  width: 35%;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  background: #ffffff;
}

/* RIGHT PANEL (FIXED) */
.right {
  flex: 1;
  position: relative;
  background: #f0f2f5;
  overflow: hidden;
}

/* CHAT IFRAME (FIXED) */
#chatFrame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}

/* ================= EMPTY STATE ================= */
#emptyChatState {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: #65676b;
  z-index: 1;
}

/* ================= HEADER ================= */
.header {
  background: #ffffff;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 600;

  display: flex;
  justify-content: space-between;
  align-items: center;

  border-bottom: 1px solid #e5e7eb;
  position: relative;
}

/* SETTINGS BUTTON */
.settingsBtnTop {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: #f0f2f5;
  cursor: pointer;
  font-size: 18px;

  display: flex;
  align-items: center;
  justify-content: center;
}

.settingsBtnTop:hover {
  background: #e4e6eb;
}

/* ================= SEARCH ================= */
.search {
  padding: 10px;
  display: flex;
  gap: 10px;
  background: #ffffff;
  border-bottom: 1px solid #e5e7eb;
}

.search input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: none;
  background: #f0f2f5;
  outline: none;
}

/* BUTTON */
button {
  background: #1877f2;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 20px;
  cursor: pointer;
}

/* ================= LIST ================= */
#results {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
}

.user:hover {
  background: #f0f2f5;
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #d8dadf;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* ================= SETTINGS DROPDOWN ================= */
#settingsMenu {
  position: absolute;
  top: 60px;
  right: 10px;

  width: 220px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);

  display: none;
  flex-direction: column;
  padding: 8px;
}

#settingsMenu.active {
  display: flex;
}

/* LOGOUT BUTTON */
.logoutBtn {
  background: none;
  color: #e53935;
  border-radius: 10px;
  padding: 10px;
  text-align: left;
  font-size: 14px;
}

.logoutBtn:hover {
  background: #f0f2f5;
}

</style>
</head>

<body>

<div class="layout">

  <!-- LEFT -->
  <div class="left">

    <div class="header">
      Chat
      <button class="settingsBtnTop" id="settingsBtn">⚙️</button>

      <div id="settingsMenu">
        
<button class="logoutBtn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="search">
      <input id="searchInput" placeholder="Search users">
      <button id="searchBtn">Search</button>
    </div>

    <div id="results"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div id="emptyChatState">
      <div style="font-size:60px;">💬</div>
      <h2>No conversation selected</h2>
      <p>Select a user to start chatting</p>
    </div>

    <iframe id="chatFrame"></iframe>

  </div>

</div>
<script src="/csrf.js"></script>
<script>

let currentUser = null;

/* ================= USER ================= */
async function getCurrentUser() {
  const res = await fetch("/user-data", {
    credentials: "include"
  });
  if (!res.ok) return;
  currentUser = await res.json();
}

/* ================= LOAD CHATS ================= */
async function loadRecentChats() {
  if (!currentUser?.id) return;

  const res = await fetch("/conversations", {
    credentials: "include"
  });

  const data = await res.json();
  const results = document.getElementById("results");
  results.innerHTML = "";

  const map = {};
  const me = currentUser;

  data.forEach(m => {
    const otherId = m.sender_id === me.id ? m.receiver_id : m.sender_id;
    map[otherId] = m;
  });

  Object.keys(map).forEach(userId => {

    const msg = map[userId];

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar">
        ${msg.other_username.charAt(0).toUpperCase()}
      </div>
      <div>
        <b>${msg.other_username}</b>
        <div style="font-size:12px;color:#666;">${msg.content}</div>
      </div>
    `;

    div.onclick = () => openChat(userId);
    results.appendChild(div);
  });
}

/* ================= SEARCH ================= */
async function searchUsers() {

  const q = document.getElementById("searchInput").value.trim();
  if (q === "") return loadRecentChats();

  const res = await fetch(`/search-users?q=${q}`, {
    credentials: "include"
  });

  const users = await res.json();
  const results = document.getElementById("results");
  results.innerHTML = "";

  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar">${u.username[0].toUpperCase()}</div>
      <div><b>${u.username}</b></div>
    `;

    div.onclick = () => openChat(u.id);
    results.appendChild(div);
  });
}

/* ================= OPEN CHAT (FIXED) ================= */
function openChat(userId) {

  const frame = document.getElementById("chatFrame");

frame.src = "/app/messaging.html?user_id=" + userId;

  document.getElementById("emptyChatState").style.display = "none";
  frame.style.display = "block";

  frame.style.opacity = "0";
  setTimeout(() => frame.style.opacity = "1", 50);
} 

/* ================= SETTINGS ================= */
function toggleSettings() {
  document.getElementById("settingsMenu").classList.toggle("active");
}

window.onclick = function(e) {
  if (!e.target.closest(".settingsBtnTop")) {
    document.getElementById("settingsMenu").classList.remove("active");
  }
};

/* ================= LOGOUT ================= */
async function logout() {
  await fetch("/logout", {
    method: "POST",
    credentials: "include"
  });

  window.location.replace("/login.html");
}
///////////////////////////////////////////////
document.getElementById("searchBtn").addEventListener("click", searchUsers);
document.getElementById("settingsBtn").addEventListener("click", toggleSettings);
document.getElementById("logoutBtn").addEventListener("click", logout);
/* ================= INIT ================= */
window.onload = async () => {
  await getCurrentUser();

  if (!currentUser) {
    window.location.replace("/login.html");
    return;
  }

  loadRecentChats();
};

</script>

</body>
</html>
