 <!DOCTYPE html>
<html lang="en">
<head>
  

<meta charset="UTF-8">
<title>Chat</title>

<style>
/* ===== MODE POPUP ===== */
#modePopup.show {
  display: flex;
  flex-direction: column;
}

/* MODE POPUP */
#modePopup {
  position: absolute;
  top: 45px;
  right: 0;

  width: min(280px, 90vw);
  background: white;

  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  padding: 10px;

  display: none;
  flex-direction: column;
  gap: 10px;

  z-index: 9999;
  box-sizing: border-box;

  animation: popIn 0.15s ease-out;
}

#modePopup textarea {
  width: 100%;
  height: 120px;
  resize: none;

  border-radius: 10px;
  border: 1px solid #ddd;

  padding: 10px;
  box-sizing: border-box;

  font-size: 13px;
  outline: none;

  background: #f9fafb;
}

#modePopup textarea:focus {
  border-color: #1877f2;
  background: #fff;
}

#saveModeBtn {
  background: #1877f2;
  color: white;

  border: none;
  padding: 9px;

  border-radius: 10px;
  cursor: pointer;

  font-weight: 600;
}

#saveModeBtn:hover {
  background: #0f66d0;
}

/* ===== GLOBAL ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: #eef1f5;
}

/* ===== APP ===== */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  background: #ffffff;
  color: #111;

  padding: 12px 16px;
  font-size: 15px;
  font-weight: 600;

  display: flex;
  justify-content: space-between;
  align-items: center;

  border-bottom: 1px solid #e5e7eb;
}

/* left header */
.headerLeft {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* avatar */
.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;

  background: #1877f2;
  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: bold;
  color: white;
}

/* ===== CHAT AREA ===== */
#chat {
  flex: 1;
  overflow-y: auto;

  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* messages */
li {
  list-style: none;

  padding: 10px 14px;
  border-radius: 18px;

  max-width: 70%;
  word-wrap: break-word;

  font-size: 14px;
  line-height: 1.3;
}

/* YOU */
.right {
  background: #1877f2;
  color: white;
  align-self: flex-end;

  border-bottom-right-radius: 6px;
}

/* OTHER */
.left {
  background: #e4e6eb;
  color: #111;
  align-self: flex-start;

  border-bottom-left-radius: 6px;
}

/* ===== INPUT BAR ===== */
.inputBar {
  display: flex;
  padding: 10px;
  gap: 10px;

  background: #ffffff;
  border-top: 1px solid #ddd;
}

/* input */
#message {
  flex: 1;

  padding: 10px 14px;
  border-radius: 20px;

  border: none;
  background: #f0f2f5;

  outline: none;
  font-size: 14px;
}

/* ===== BUTTONS ===== */
.sendBtn, .aiBtn {
  width: 42px;
  height: 42px;

  border-radius: 50%;
  border: none;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;

  transition: 0.2s;
}

/* send */
.sendBtn {
  background: #1877f2;
  color: white;
}

.sendBtn:hover {
  background: #0f66d0;
}

/* AI button */
.aiBtn {
  background: #e4e6eb;
  color: #333;
}

.aiBtn:hover {
  background: #d8dadf;
}

/* header buttons */
#autoAiBtn, #modeBtn {
  background: #f0f2f5;
  border: none;

  padding: 6px 10px;
  border-radius: 20px;

  cursor: pointer;
  font-size: 13px;
}

/* ===== AI POPUP ===== */
#aiPopup {
  position: fixed;
  bottom: 90px;
  right: 20px;

  width: 300px;
  max-width: 90vw;

  background: #fff;
  border-radius: 16px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  border: 1px solid #e5e7eb;

  display: none;
  flex-direction: column;

  overflow: hidden;
  z-index: 9999;

  animation: popIn 0.2s ease-out;
}

/* title */
#aiPopup h3 {
  margin: 0;
  padding: 12px 14px;

  font-size: 14px;
  font-weight: 600;

  background: #1877f2;
  color: white;
}

/* input */
#aiInput {
  margin: 10px;
  padding: 10px 12px;

  border-radius: 10px;
  border: 1px solid #ddd;

  outline: none;
  font-size: 14px;

  background: #f9fafb;
}

#aiInput:focus {
  border-color: #1877f2;
  background: #fff;
}

/* suggestions */
#aiSuggestions {
  padding: 0 10px;

  display: flex;
  flex-direction: column;
  gap: 6px;

  max-height: 180px;
  overflow-y: auto;
}

/* suggestion item */
.aiSuggestion {
  background: #f0f2f5;
  padding: 10px 12px;

  border-radius: 12px;

  font-size: 13px;
  cursor: pointer;

  transition: 0.2s;
}

.aiSuggestion:hover {
  background: #dbe7ff;
  transform: translateY(-1px);
}

/* bottom buttons */
.aiBtnRow {
  display: flex;
  gap: 8px;

  padding: 10px;
  border-top: 1px solid #eee;
}

.closeBtn, .sendAiBtn {
  flex: 1;

  padding: 9px;
  border: none;

  border-radius: 10px;
  cursor: pointer;

  font-size: 13px;
  transition: 0.2s;
}

.closeBtn {
  background: #f0f2f5;
}

.closeBtn:hover {
  background: #e4e6eb;
}

.sendAiBtn {
  background: #1877f2;
  color: white;
}

.sendAiBtn:hover {
  background: #0f66d0;
}

/* AI info box */
#aiInfoBox {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #1877f2;
  color: white;

  padding: 8px 12px;
  border-radius: 20px;

  font-size: 12px;

  display: none;
}

/* ===== ANIMATION ===== */
@keyframes popIn {
  from {
    transform: translateY(10px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
#limitPopup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);

  background: #ff4d4f;
  color: white;

  padding: 10px 16px;
  border-radius: 12px;

  font-size: 14px;
  font-weight: 600;

  display: none;
  z-index: 99999;
}
</style>

<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<audio id="remoteAudio" autoplay></audio>

<div class="app">

  <div class="header">
    <div class="headerLeft">
      <div class="avatar" id="avatar">U</div>
      <div id="chatTitle">Loading...</div>
    </div>
     
    <div>
    <button id="modeBtn">🧠 MODE</button>
    <button id="autoAiBtn">⚡ OFF</button>
    </div>
  </div>

  <ul id="chat"></ul>

  <div class="inputBar">
    <input id="message" placeholder="Message">
    <button class="aiBtn" id="aiBtn">✨</button>
    <button class="sendBtn" id="sendBtn">➤</button>
    <script src="mode.js"></script>
  </div>

</div>
<!-- MODE POPUP -->
<div id="modePopup">
  <b>AI Behavior</b>
  <textarea id="modeInput" placeholder="Example: be funny, short replies, act like teacher..."></textarea>
  <button id="saveModeBtn">Save</button>
</div>
<!-- AI POPUP -->
<div id="aiPopup">
  <h3>AI Suggestion</h3>
  <input id="aiInput" placeholder="Ask AI Suggestion ... ">
  <div id="aiSuggestions"></div>

  <div class="aiBtnRow">
    <button class="closeBtn" id="closeAiBtn">Close</button>
    <button class="sendAiBtn" id="sendAiBtn">➤</button>
  </div>
</div>
<div id="limitPopup"></div>
<div id="aiInfoBox">⚡ Auto AI is ON</div>
<script src="/csrf.js"></script>
<script src="/app/mode.js"></script>
<script src="/app/send_ai.js"></script>
<script src="/app/send.js"></script>
<script src="/app/automatique_message.js"></script>



<script>
  "use strict"; 

document.addEventListener("DOMContentLoaded", () => {
  window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
      window.location.reload();
    }
  });

  const socket = io();

  let currentUser = null;
  window.receiver_id = null;
  async function loadAutoAIState() {
   
  const res = await fetch( `/get-auto-ai?receiver_id=${window.receiver_id}`,{
    credentials: "include"
  });

  const data = await res.json();

  window.autoAI.enabled = data.enabled;

  const btn = document.getElementById("autoAiBtn");
  const info = document.getElementById("aiInfoBox");

  btn.innerHTML = window.autoAI.enabled ? "⚡ ON" : "⚡ OFF";
  info.style.display = "none";

  if (window.autoAI.enabled) window.autoAI.start();
   else window.autoAI.stop();
}

  async function loadUser() {
    const res = await fetch("/user-data", {
      credentials: "include"
    });
    if (!res.ok) {
    window.location.replace("/login.html");
    return;
  }

    currentUser = await res.json();
    window.currentUser = currentUser;

    socket.emit("join", String(currentUser.id));

    window.receiver_id = Number(
      new URLSearchParams(location.search).get("user_id")
    );

    if (window.receiver_id) {

      const resUser = await fetch(
        `/user-by-id/${window.receiver_id}`,
        { credentials: "include" }
      );

      const user = await resUser.json();

      document.getElementById("chatTitle").textContent = user.username;
      document.getElementById("avatar").textContent =
        user.username.charAt(0).toUpperCase();

      setTimeout(async () => {
        await loadMessages();
        await loadAutoAIState();
}, 100);    }
  }

  window.loadMessages = async function () {

    if (!window.receiver_id || isNaN(window.receiver_id)) return;

    const res = await fetch(
      `/messages?receiver_id=${window.receiver_id}`,
      { credentials: "include" }
    );

    const data = await res.json();
    const chat = document.getElementById("chat");

    chat.innerHTML = "";

    data.forEach(m => {
      const li = document.createElement("li");

      const isMe = Number(m.sender_id) === Number(currentUser.id);

      li.className = isMe ? "right" : "left";
      li.textContent = m.content;

      chat.appendChild(li);
    });

    chat.scrollTop = chat.scrollHeight;

    const lastIncoming = [...data]
      .reverse()
      .find(m => Number(m.sender_id) !== Number(currentUser.id));

    if (window.autoAI?.enabled && lastIncoming) {
      window.autoAI.handleIncoming(lastIncoming);
    }
  };
/* ================= MODE SYSTEM ================= */
  document.getElementById("modeBtn").onclick = () => {
  const p = document.getElementById("modePopup");

  if (p.style.display === "block") {
    p.style.display = "none";
  } else {
    p.style.display = "block";
  }
};

  document.getElementById("saveModeBtn").onclick = () => {
    window.aiMode.set(
  document.getElementById("modeInput").value
);

    document.getElementById("modePopup").style.display = "none";
  };
  const btn = document.getElementById("autoAiBtn");
  const info = document.getElementById("aiInfoBox");

  btn.onclick = async () => {
  

  const csrfRes = await fetch("/csrf-token", {
    credentials: "include"
  });

  const { csrfToken } = await csrfRes.json();

  const res = await fetch("/toggle-auto-ai", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "X-CSRF-Token": csrfToken
  },
  credentials: "include",
  body: JSON.stringify({
    receiver_id: window.receiver_id
  })
});

const data = await res.json(); // ✅ now works
  // 🔐 IMPORTANT: backend decides state
  window.autoAI.enabled = data.enabled;
  btn.innerHTML = window.autoAI.enabled ? "⚡ ON" : "⚡ OFF";
  if (window.autoAI.enabled) {

  info.textContent = "⚡ Auto AI is ON";
  info.style.display = "block";

  // auto hide after 2 seconds
  clearTimeout(window.aiInfoTimeout);

  window.aiInfoTimeout = setTimeout(() => {
    info.style.display = "none";
  }, 2000);

} else {

  info.textContent = "⛔ Auto AI is OFF";
  info.style.display = "block";

  clearTimeout(window.aiInfoTimeout);

  window.aiInfoTimeout = setTimeout(() => {
    info.style.display = "none";
  }, 2000);
}

  if (window.autoAI.enabled) window.autoAI.start();
  else window.autoAI.stop();
};

  document.getElementById("sendBtn").onclick = () => {
    if (window.sendMessage) sendMessage();
  };

  const popup = document.getElementById("aiPopup");

  document.getElementById("aiBtn").onclick = () => {
  const popup = document.getElementById("aiPopup");
  const aiInput = document.getElementById("aiInput");
  const aiBox = document.getElementById("aiSuggestions");

  popup.style.display = "flex";

  // CLEAR OLD DATA
  aiInput.value = "";
  aiBox.innerHTML = "";
  };

  document.getElementById("closeAiBtn").onclick = () => {
  const popup = document.getElementById("aiPopup");
  const aiInput = document.getElementById("aiInput");
  const aiBox = document.getElementById("aiSuggestions");

  popup.style.display = "none";

 
  // CLEAR OLD DATA
  aiInput.value = "";
  aiBox.innerHTML = "";
  };

  document.getElementById("sendAiBtn").onclick = async () => {
    

    const input = document.getElementById("aiInput").value.trim();
const box = document.getElementById("aiSuggestions");
    if (!input) {
  box.innerHTML = ""; // CLEAR OLD SUGGESTIONS
  return;
}

    const res = await fetch("/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: input,
        mode: "ai_writer"
      })
    });
    
// ❌ HANDLE API LIMIT / ERROR
if (!res.ok) {
  let msg = "⚠️ AI limit reached. Please wait.";

  try {
    const text = await res.text();
    const err = JSON.parse(text);

    msg = err.message || err.reply || msg;
  } catch (e) {}

  window.showLimitPopup(msg);
  return;
}

    const data = await res.json();

    
    box.innerHTML = "";

    const suggestions = (data.reply || "")
      .split("\n")
      .map(s => s.trim())
      .filter(Boolean);

    suggestions.forEach(text => {
      const item = document.createElement("div");

      item.textContent = text;
      item.className = "aiSuggestion";

      item.onclick = () => {
        document.getElementById("message").value = text;
        popup.style.display = "none";
      };

      box.appendChild(item);
    });
  };
//////////////////erreur max is reached //////////////////////////
window.showLimitPopup = function (msg) {
  const box = document.getElementById("limitPopup");

  box.innerText = msg;
  box.style.display = "block";

  clearTimeout(window.limitTimer);

  window.limitTimer = setTimeout(() => {
    box.style.display = "none";
  }, 3000);
};
  loadUser();
  

  setInterval(() => {
    if (window.receiver_id) loadMessages();
  }, 2000);

});

</script>

</body>
</html>
